<!-- The button to open modal -->
<label for="login-modal" class="btn">Login</label>

<!-- Put this part before </body> tag -->
<input type="checkbox" id="login-modal" class="modal-toggle" />
<div class="modal" role="dialog">
  <div class="modal-box flex items-center justify-center rounded-lg shadow-lg">
    <div class="w-full max-w-sm p-8">

      <h1 class="text-2xl font-bold mb-6 text-center text-primary">
        Login
      </h1>

      <form class="flex flex-col gap-4" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <label class="input validator">
          <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
              <path
                d="M2.586 17.414A2 2 0 0 0 2 18.828V21a1 1 0 0 0 1 1h3a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h1a1 1 0 0 0 1-1v-1a1 1 0 0 1 1-1h.172a2 2 0 0 0 1.414-.586l.814-.814a6.5 6.5 0 1 0-4-4z">
              </path>
              <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
            </g>
          </svg>
          <input type="text" required placeholder="Token" formControlName="token" />
        </label>

        <button class="btn btn-primary" type="submit">Login</button>
      </form>

      @if (hasError()) {
      <p class="text-error text-sm mt-4 text-center">
        El token es obligatorio.
      </p>
      }

    </div>
  </div>
  <label class="modal-backdrop" for="login-modal">Close</label>
</div>
