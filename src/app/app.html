<router-outlet></router-outlet>

@if (toastService.toasts().length > 0) {
  <div class="toast toast-end toast-bottom z-[9999] p-4 flex flex-col gap-2">
    @for (toast of toastService.toasts(); track toast.id) {
      <div class="alert shadow-lg flex items-center justify-between gap-4 py-3 px-4 rounded-lg"
           [class.alert-success]="toast.type === 'success'"
           [class.alert-error]="toast.type === 'error'"
           [class.alert-info]="toast.type === 'info'"
           [class.alert-warning]="toast.type === 'warning'">
        <div class="flex items-center gap-2">
          @if (toast.type === 'success') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          } @else if (toast.type === 'error') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          } @else if (toast.type === 'warning') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
          }
          <span class="text-sm font-medium">{{ toast.message }}</span>
        </div>
        <button class="btn btn-ghost btn-circle btn-xs hover:bg-black/10 border-none" (click)="toastService.remove(toast.id)">✕</button>
      </div>
    }
  </div>
}
