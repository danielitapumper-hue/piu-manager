<a class="hover-3d cursor-pointer" (click)="openDialog()">

  <div class="card card-sm card-border bg-primary/5 shadow-sm" [class]="{'border-success': chartScore().score}">
    <figure>
      <img [src]="chartScore().chart.song.imagePath" [alt]="chartScore().chart.song.name" />
    </figure>
    <div class="card-body items-center text-center block space-y-3">
      <h2 class="card-title wrap-break-word block">
        {{ chartScore().chart.song.name }}
      </h2>
      @if(chartScore().score){
      <div class="flex flex-row justify-evenly gap-2 w-full">
        <span class="font-bold">{{ chartScore().score!.score | number }}</span>
        <img [src]="chartScore().score!.isBroken
          ? `B_${chartScore().score!.letterGrade}`
          : `R_${chartScore().score!.letterGrade}` | imageSrc" [alt]="chartScore().score!.letterGrade" class="w-9">

        @if(chartScore().score!.plate){
        <img [src]="chartScore().score!.plate!.split(' ').map(word => word.charAt(0)).join('') | imageSrc"
          [alt]="chartScore().score!.plate!" class="w-7" />
        }
      </div>
      }
      <div class="flex flex-row justify-end gap-2 w-full">
        <button class="btn btn-sm btn-circle btn-outline btn-primary" (click)="openYoutubeSearch()">
          <svg focusable="false" viewBox="0 0 24 24" width="20" aria-hidden="true" role="img" fill="white">
            <path
              d="M10 15l5.19-3L10 9v6m11.56-7.83c.13.47.22 1.1.28 1.9.07.8.1 1.49.1 2.09L22 12c0 2.19-.16 3.8-.44 4.83-.25.9-.83 1.48-1.73 1.73-.47.13-1.33.22-2.65.28-1.3.07-2.49.1-3.59.1L12 19c-4.19 0-6.8-.16-7.83-.44-.9-.25-1.48-.83-1.73-1.73-.13-.47-.22-1.1-.28-1.9-.07-.8-.1-1.49-.1-2.09L2 12c0-2.19.16-3.8.44-4.83.25-.9.83-1.48 1.73-1.73.47-.13 1.33-.22 2.65-.28 1.3-.07 2.49-.1 3.59-.1L12 5c4.19 0 6.8.16 7.83.44.9.25 1.48.83 1.73 1.73z">
            </path>
          </svg>
        </button>
      </div>
    </div>
  </div>

</a>
