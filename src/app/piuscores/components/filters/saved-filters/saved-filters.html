<h2>Filtros guardados</h2>
<div class="grid grid-cols-4 gap-3 justify-items-center mt-2">

  @for (filter of savedFiltersArray(); track filter) {

  <div class="badge badge-success" [class]="{
      'badge-success': filter.split('-').at(0)==='Double',
      'badge-error': filter.split('-').at(0)==='Single'
      }" (click)="search(filter)">
    {{ filter | chartType }}
  </div>

  }
</div>
