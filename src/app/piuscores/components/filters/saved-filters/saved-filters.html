<h2>Filtros guardados</h2>
<div class="grid grid-cols-4 gap-3 justify-items-center mt-2">

  @for (searchFilter of savedFiltersArray(); track searchFilter) {

  <div class="badge badge-success" [class]="{
      'badge-success': searchFilter.chartType==='Double',
      'badge-error': searchFilter.chartType==='Single'
      }" (click)="search(searchFilter.filter!)">
    {{ searchFilter | shortHand }}
  </div>

  }
  @empty {
  <!-- TODO -->
  }
</div>
