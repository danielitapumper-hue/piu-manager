<div class="flex gap-2 justify-start mt-4">
  <label class="cursor-pointer flex-1">
    <input #stagePassInput type="checkbox" class="checkbox checkbox-primary checkbox-sm"
      [checked]="stagePassValue() === true" [indeterminate]="stagePassValue() === null"
      (change)="toggleStagePass(stagePassInput)" />
    <span class="ml-1">Stage pass</span>
  </label>
</div>
