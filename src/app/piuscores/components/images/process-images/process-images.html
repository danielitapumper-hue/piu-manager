<!-- Global Actions Control Bar -->
@if (scanItems().length > 0) {
<div class="flex flex-wrap items-center justify-between gap-4 p-4 bg-base-200 rounded-box shadow-inner">
  <div class="flex items-center gap-2">
    <span class="font-semibold text-sm">{{ scanItems().length }} imagen(es) cargada(s)</span>
  </div>
  <div class="flex gap-2">
    <button class="btn btn-outline btn-sm btn-error" (click)="clearAll()">
      Limpiar todo
    </button>
    <button class="btn btn-primary btn-sm" (click)="saveAllReady()" [disabled]="getReadyItems().length === 0">
      Guardar todos los listos
    </button>
  </div>
</div>

<!-- Cards List -->
<div class="flex flex-col gap-4">
  @for (item of scanItems(); track item.id) {
  <process-images-item [item]="item" (updatedItem)="saveItem($event)" (removedItem)="removeItem($event)"
    (formValidItem)="updateFormValidItem($event)" />
  }
</div>
}
