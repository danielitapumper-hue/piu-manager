<!-- Drag and Drop Zone -->
<div
  class="card bg-base-200/50 border-2 border-dashed rounded-box p-8 flex flex-col items-center justify-center text-center cursor-pointer transition-all duration-300 hover:bg-base-200/80"
  [class]="{
    'border-primary':isDragOver(),
    'border-base-300':!isDragOver(),
    'bg-base-300':isDragOver()
  }" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onDrop($event)"
  (click)="fileInput.click()">

  <input #fileInput type="file" multiple accept="image/*" class="hidden" (change)="onFileSelected($event)" />

  <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-primary/70 mb-3 animate-pulse" fill="none"
    viewBox="0 0 24 24" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
      d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
  </svg>

  <p class="text-base font-bold text-base-content">Arrastra tus capturas aquí o haz clic para buscarlas</p>
  <p class="text-xs text-base-content/50 mt-1">Soporta múltiples imágenes simultáneamente (Formatos JPG, PNG, WEBP,
    etc.)</p>
</div>
