<form class="flex flex-col" [formGroup]="tierListForm" (ngSubmit)="onSearch()">

  <div class="grid row-auto grid-cols-3 gap-4 justify-content-center justify-items-center">
    <div class="grid grid-cols-2 gap-4 w-full">
      <button type="button" class="btn btn-error" [class.btn-outline]="tierListForm.value.chartType!=='Single'"
        (click)="tierListForm.patchValue({chartType:'Single'})">Single</button>
      <button type="button" class="btn btn-success" [class.btn-outline]="tierListForm.value.chartType!=='Double'"
        (click)="tierListForm.patchValue({chartType:'Double'})">Double</button>
    </div>

    <div class="grid grid-cols-1 justify-content-center justify-items-center w-full">
      <input type="number" class="input" placeholder="Dificultad" formControlName="level" />
    </div>

    <div class="grid grid-flow-col auto-cols-max gap-4 w-full" formArrayName="songTypes">
      @for (songType of piuScoresService.getSongTypes(); track songType; let i = $index) {
      <label class="cursor-pointer">
        <input type="checkbox" class="checkbox checkbox-primary" [formControlName]="i" />
        <span class="ml-2">{{ songType }}</span>
      </label>
      }
    </div>
  </div>

  <div class="flex justify-end mt-4 mr-4">
    <button type="submit" class="btn btn-primary">Buscar</button>
  </div>

</form>

<div class="grid grid-cols-4 mt-4 gap-4">
  @for (song of tierList(); track $index) {
  <song-card [chart]="song.chart" />
  }
  @empty{
  <p class="text-center col-span-4">No se encontraron resultados</p>
  }
</div>
