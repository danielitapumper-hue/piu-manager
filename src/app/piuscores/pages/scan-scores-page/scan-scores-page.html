<div class="flex flex-col w-full max-w-5xl mx-auto pb-12">
  <app-title [title]="'Escanear Scores'"
    [subTitle]="'Sube capturas de tus puntuaciones para escanearlas de forma automática. Puedes subir varias imágenes en simultáneo. Las imágenes no se almacenarán en ningún servidor.'" />

  <gemini-api-key-config />

  @if(geminiApiKey()) {
  <upload-images (files)="processFiles($event)" />

  <process-images [files]="filesList()" />
  }
</div>
