<div class="overflow-x-auto">
  <table class="table">
    <!-- head -->
    <thead>
      <tr>
        <th></th>
        <th>Nivel</th>
        <th>Score</th>
      </tr>
    </thead>
    <tbody>

      @for (result of scoresResource.value()?.results; track $index) {
      <tr>
        <td>
          <div class="flex items-center gap-3">
            <div class="avatar">
              <div class="mask mask-squircle h-12 w-12">
                <img [src]="result.chart.song.imagePath" [alt]="result.chart.song.name" />
              </div>
            </div>
            <div>
              <div class="font-bold">{{ result.chart.song.name }}</div>
              <div class="text-sm opacity-50">{{ result.chart.song.type }}</div>
            </div>
          </div>
        </td>

        <td>
          {{ result.chart.type }} {{ result.chart.level}}
        </td>
        <td class="text-right">
          {{ result.score | number:'1.0-0' }}
        </td>
      </tr>
      }
      @empty {
      <h1>No scores available</h1>
      }

    </tbody>
    <!-- foot -->
    <tfoot>
      <tr>
        <th></th>
        <th>Name</th>
        <th>Job</th>
        <th>Favorite Color</th>
        <th></th>
      </tr>
    </tfoot>
  </table>
</div>
