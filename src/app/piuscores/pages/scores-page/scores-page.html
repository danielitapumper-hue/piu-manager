<saved-filters (filter)="searchSavedFilter($event)" />

<div class="divider"></div>

<div class="grid grid-cols-1 gap-x-2 gap-y-10 mt-2 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-3 2xl:grid-cols-4">

  @for(categoryChart of this.scoresListByLetterGrade(); track categoryChart.category) {

  <div>
    <img [src]="`R_${categoryChart.category}` | imageSrc" [alt]="categoryChart.category" class="w-9">

    <div class="overflow-x-auto">
      <table class="table">
        <thead>
          <tr>
            <th>Canción</th>
            <th>Puntaje</th>
          </tr>
        </thead>
        <tbody>

          @for (chartScore of categoryChart.charts; track $index) {
          <tr>
            <td>
              <div class="flex items-center gap-3">
                <div class="avatar">
                  <div class="mask mask-squircle h-12 w-12">
                    <img [src]="chartScore.chart.song.imagePath" [alt]="chartScore.chart.song.name" />
                  </div>
                </div>
                <div>
                  <div class="font-bold">{{ chartScore.chart.song.name }}</div>
                  <div class="text-sm opacity-50">{{ chartScore.score!.plate }}</div>
                </div>
              </div>
            </td>
            <td>{{ chartScore.score!.score| number }}</td>
          </tr>
          }

        </tbody>
      </table>
    </div>
  </div>

  }

</div>
