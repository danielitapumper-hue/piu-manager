name: Deploy to GitHub Pages

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        run: npm run build

      - name: Copy SPA fallback and nojekyll
        run: |
          cp .nojekyll dist/piu-manager/browser/. || true
          cp dist/piu-manager/browser/index.html dist/piu-manager/browser/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/piu-manager/browser
          cname: false
